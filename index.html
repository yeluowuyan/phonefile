<!doctype html>
<html lang="zh-CN">
<head>

  <title>程序员英语单词学习</title>
  <style>
:root {
  color-scheme: light;
  --bg: #f7f7f3;
  --surface: #ffffff;
  --surface-muted: #f0f4f2;
  --text: #18201d;
  --muted: #5f6b65;
  --line: #d9dfdb;
  --accent: #1f6f5b;
  --accent-strong: #164e40;
  --focus: #bd7a24;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
  line-height: 1.5;
}

button,
input,
select {
  font: inherit;
}

button {
  border: 1px solid var(--accent);
  border-radius: 6px;
  background: var(--accent);
  color: #ffffff;
  cursor: pointer;
  min-height: 40px;
  padding: 0 16px;
}

button:hover,
button:focus-visible {
  background: var(--accent-strong);
}

input,
select {
  width: 100%;
  min-height: 40px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: #ffffff;
  color: var(--text);
  padding: 0 12px;
}

input:focus,
select:focus,
button:focus-visible,
.word-item:focus-visible {
  outline: 3px solid color-mix(in srgb, var(--focus) 36%, transparent);
  outline-offset: 2px;
}

.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  max-width: 1180px;
  margin: 0 auto;
  padding: 24px 20px 16px;
}

.app-header h1 {
  margin: 0;
  font-size: 28px;
  line-height: 1.2;
}

.app-header p {
  margin: 6px 0 0;
  color: var(--muted);
}

.app-shell {
  display: grid;
  grid-template-columns: 320px minmax(0, 1fr);
  gap: 16px;
  max-width: 1180px;
  margin: 0 auto;
  padding: 0 20px 32px;
}

.toolbar,
.resources-panel,
.study-panel,
.word-list-wrap {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
}

.toolbar {
  display: grid;
  grid-column: 1;
  gap: 8px;
  align-self: start;
  padding: 16px;
}

.resources-panel {
  display: grid;
  grid-column: 1;
  gap: 12px;
  align-self: start;
  padding: 16px;
}

.resources-panel h2,
.resources-panel h3 {
  margin: 0;
  font-size: 18px;
}

.resources-panel h3 {
  margin-top: 4px;
  font-size: 16px;
}

.tip-list,
.resource-list {
  display: grid;
  gap: 10px;
  list-style: none;
  margin: 0;
  padding: 0;
}

.tip-list li {
  border-left: 3px solid var(--accent);
  color: var(--muted);
  padding-left: 10px;
}

.resource-list a {
  display: grid;
  gap: 3px;
  border: 1px solid var(--line);
  border-radius: 6px;
  color: var(--text);
  padding: 10px;
  text-decoration: none;
}

.resource-list a:hover,
.resource-list a:focus-visible {
  background: var(--surface-muted);
  outline: 3px solid color-mix(in srgb, var(--focus) 36%, transparent);
  outline-offset: 2px;
}

.resource-list span {
  color: var(--muted);
  font-size: 14px;
}

.search-label,
.category-label {
  font-weight: 700;
}

.study-panel {
  grid-column: 2;
  grid-row: 1 / span 2;
  min-height: 230px;
  padding: 24px;
}

.word-focus {
  display: grid;
  gap: 10px;
}

.word-meta {
  color: var(--accent-strong);
  font-weight: 700;
}

.word-focus h2 {
  margin: 0;
  font-size: 42px;
  line-height: 1.12;
  overflow-wrap: anywhere;
}

.word-focus p {
  margin: 0;
  color: var(--muted);
  font-size: 17px;
}

#activeMeaning {
  color: var(--text);
  font-size: 21px;
  font-weight: 700;
}

#activeExample {
  color: var(--accent-strong);
}

.audio-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 8px;
}

#speakButton,
#youdaoButton {
  justify-self: start;
}

.word-list-wrap {
  grid-column: 1 / -1;
  overflow: hidden;
}

.list-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  border-bottom: 1px solid var(--line);
  padding: 14px 16px;
}

.list-header h2 {
  margin: 0;
  font-size: 18px;
}

#countLabel {
  color: var(--muted);
}

.word-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 0;
  list-style: none;
  margin: 0;
  padding: 0;
  max-height: 520px;
  overflow: auto;
}

.word-item {
  display: grid;
  gap: 4px;
  min-height: 108px;
  border: 0;
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  border-radius: 0;
  background: #ffffff;
  color: var(--text);
  text-align: left;
  padding: 14px;
}

.word-item:hover,
.word-item.is-active {
  background: var(--surface-muted);
}

.word-item strong {
  font-size: 18px;
  overflow-wrap: anywhere;
}

.word-item span {
  color: var(--muted);
}

.word-item small {
  color: var(--accent-strong);
  font-weight: 700;
}

.empty-state {
  grid-column: 1 / -1;
  color: var(--muted);
  padding: 28px 16px;
}

@media (max-width: 760px) {
  .app-header {
    align-items: stretch;
    flex-direction: column;
  }

  .app-shell {
    grid-template-columns: 1fr;
  }

  .toolbar,
  .resources-panel,
  .study-panel {
    grid-column: 1;
    grid-row: auto;
  }

  .resources-panel {
    order: 3;
  }

  .word-focus h2 {
    font-size: 34px;
  }
}

</style>
</head>

  <header class="app-header">
    <div>
      <h1>程序员英语单词学习</h1>
      <p id="summary">加载词表中</p>
    </div>
    <button id="shuffleButton" type="button">随机学习</button>
  </header>

  <main class="app-shell">
    <section class="toolbar" aria-label="筛选工具">
      <label class="search-label" for="searchInput">搜索</label>
      <input id="searchInput" type="search" placeholder="输入单词、中文或例句" autocomplete="off">

      <label class="category-label" for="categorySelect">词性</label>
      <select id="categorySelect"></select>
    </section>

    <section class="resources-panel" aria-labelledby="resourcesTitle">
      <h2 id="resourcesTitle">学习建议</h2>
      <ul id="learningTips" class="tip-list"></ul>
      <h3>参考网站</h3>
      <ul id="learningResources" class="resource-list"></ul>
    </section>

    <section class="study-panel" aria-live="polite">
      <div class="word-focus">
        <div class="word-meta" id="activeCategory"></div>
        <h2 id="activeWord">请选择单词</h2>
        <p id="activeMeaning"></p>
        <p id="activePronunciation"></p>
        <p id="activeNote"></p>
        <p id="activeExample"></p>
        <div class="audio-actions" aria-label="发音工具">
          <button id="speakButton" type="button">浏览器发音</button>
          <button id="youdaoButton" type="button">有道美式发音</button>
        </div>
      </div>
    </section>

    <section class="word-list-wrap">
      <div class="list-header">
        <h2>词表</h2>
        <span id="countLabel"></span>
      </div>
      <ol id="wordList" class="word-list"></ol>
    </section>
  </main>

  <script>
const words = Array.isArray(window.WORD_DATA) ? window.WORD_DATA : [];
const learningTips = Array.isArray(window.LEARNING_TIPS) ? window.LEARNING_TIPS : [];
const learningResources = Array.isArray(window.LEARNING_RESOURCES) ? window.LEARNING_RESOURCES : [];

const elements = {
  summary: document.querySelector('#summary'),
  searchInput: document.querySelector('#searchInput'),
  categorySelect: document.querySelector('#categorySelect'),
  shuffleButton: document.querySelector('#shuffleButton'),
  speakButton: document.querySelector('#speakButton'),
  youdaoButton: document.querySelector('#youdaoButton'),
  learningTips: document.querySelector('#learningTips'),
  learningResources: document.querySelector('#learningResources'),
  wordList: document.querySelector('#wordList'),
  countLabel: document.querySelector('#countLabel'),
  activeCategory: document.querySelector('#activeCategory'),
  activeWord: document.querySelector('#activeWord'),
  activeMeaning: document.querySelector('#activeMeaning'),
  activePronunciation: document.querySelector('#activePronunciation'),
  activeNote: document.querySelector('#activeNote'),
  activeExample: document.querySelector('#activeExample'),
};

let filteredWords = words;
let activeWord = words[0] ?? null;

init();

function init() {
  elements.summary.textContent = `${words.length} 个软件技术英语词条，支持离线查看`;
  fillCategories();
  renderLearningResources();
  bindEvents();
  render();
}

function fillCategories() {
  const categories = [...new Set(words.map((item) => item.category || '未分类'))].sort((a, b) =>
    a.localeCompare(b, 'zh-CN'),
  );

  elements.categorySelect.innerHTML = [
    '<option value="">全部词性</option>',
    ...categories.map((category) => `<option value="${escapeHtml(category)}">${escapeHtml(category)}</option>`),
  ].join('');
}

function bindEvents() {
  elements.searchInput.addEventListener('input', render);
  elements.categorySelect.addEventListener('change', render);
  elements.shuffleButton.addEventListener('click', selectRandomWord);
  elements.speakButton.addEventListener('click', () => speak(activeWord?.word));
  elements.youdaoButton.addEventListener('click', () => playYoudaoAudio(activeWord?.word));
}

function renderLearningResources() {
  elements.learningTips.innerHTML = learningTips.map((tip) => `<li>${escapeHtml(tip)}</li>`).join('');
  elements.learningResources.innerHTML = learningResources
    .map(
      (resource) => `<li>
        <a href="${escapeHtml(resource.url)}" target="_blank" rel="noopener noreferrer">
          <strong>${escapeHtml(resource.title)}</strong>
          <span>${escapeHtml(resource.description)}</span>
        </a>
      </li>`,
    )
    .join('');
}

function render() {
  const keyword = elements.searchInput.value.trim().toLowerCase();
  const category = elements.categorySelect.value;

  filteredWords = words.filter((item) => {
    const matchesCategory = !category || (item.category || '未分类') === category;
    const text = `${item.word} ${item.meaning} ${item.note} ${item.example} ${item.pronunciation}`.toLowerCase();
    return matchesCategory && (!keyword || text.includes(keyword));
  });

  if (!filteredWords.includes(activeWord)) {
    activeWord = filteredWords[0] ?? null;
  }

  renderActiveWord();
  renderWordList();
}

function renderActiveWord() {
  if (!activeWord) {
    elements.activeCategory.textContent = '';
    elements.activeWord.textContent = '没有匹配结果';
    elements.activeMeaning.textContent = '换一个关键词或词性试试';
    elements.activePronunciation.textContent = '';
    elements.activeNote.textContent = '';
    elements.activeExample.textContent = '';
    elements.speakButton.disabled = true;
    elements.youdaoButton.disabled = true;
    return;
  }

  elements.activeCategory.textContent = activeWord.category || '未分类';
  elements.activeWord.textContent = activeWord.word;
  elements.activeMeaning.textContent = activeWord.meaning || '暂无翻译';
  elements.activePronunciation.textContent = activeWord.pronunciation || '暂无音标';
  elements.activeNote.textContent = `说明：${activeWord.note || '暂无'}`;
  elements.activeExample.textContent = `例句：${activeWord.example || '暂无'}`;
  elements.speakButton.disabled = false;
  elements.youdaoButton.disabled = false;
}

function renderWordList() {
  elements.countLabel.textContent = `${filteredWords.length} / ${words.length}`;

  if (filteredWords.length === 0) {
    elements.wordList.innerHTML = '<li class="empty-state">没有找到匹配的单词</li>';
    return;
  }

  elements.wordList.innerHTML = filteredWords
    .map((item) => {
      const activeClass = item === activeWord ? ' is-active' : '';
      return `<li>
        <button class="word-item${activeClass}" type="button" data-word="${escapeHtml(item.word)}">
          <strong>${escapeHtml(item.word)}</strong>
          <span>${escapeHtml(item.meaning || '暂无翻译')}</span>
          <small>${escapeHtml(item.category || '未分类')}</small>
        </button>
      </li>`;
    })
    .join('');

  for (const button of elements.wordList.querySelectorAll('.word-item')) {
    button.addEventListener('click', () => {
      activeWord = filteredWords.find((item) => item.word === button.dataset.word) ?? activeWord;
      renderActiveWord();
      renderWordList();
    });
  }
}

function selectRandomWord() {
  if (filteredWords.length === 0) {
    return;
  }

  activeWord = filteredWords[Math.floor(Math.random() * filteredWords.length)];
  renderActiveWord();
  renderWordList();
}

function speak(word) {
  if (!word || !('speechSynthesis' in window)) {
    return;
  }

  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(word);
  utterance.lang = 'en-US';
  window.speechSynthesis.speak(utterance);
}

function playYoudaoAudio(word) {
  if (!word) {
    return;
  }

  const audio = new Audio(`http://dict.youdao.com/dictvoice?audio=${encodeURIComponent(word.toLowerCase())}&type=2`);
  audio.play();
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, (char) => {
    const entities = {
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;',
    };
    return entities[char];
  });
}

</script>
